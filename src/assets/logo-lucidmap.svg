<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="8" width="144" height="144" rx="36" fill="url(#bg)"/>

  <!-- "Da Huang" (Chinese village dog) mascot: side profile, fuller silhouette + details -->
  <g>
    <!-- Neck shadow (behind collar) -->
    <path
      d="M48 114Q 52 132 70 136Q 84 140 98 132Q 86 140 68 142Q 52 142 48 126Q 46 120 48 114Z"
      fill="url(#neckShadow)"
      opacity="0.55"
    />

    <!-- Ear (upright, thick outline) -->
    <path
      d="M70 76
         Q 60 56 70 42
         Q 82 32 94 44
         Q 98 64 86 82
         Q 78 92 70 76Z"
      fill="#D79A35"
      stroke="#1F1C18"
      stroke-width="3.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M74 74
         Q 68 60 74 50
         Q 82 44 88 52
         Q 90 64 84 74
         Q 80 80 74 74Z"
      fill="#F7D48E"
      opacity="0.85"
    />

    <!-- Head + snout silhouette (facing right) -->
    <path
      d="M52 112
         Q 40 98 44 80
         Q 50 58 70 54
         Q 88 48 102 60
         Q 114 62 128 74
         Q 144 88 132 104
         Q 124 114 110 116
         Q 102 132 86 138
         Q 64 146 50 130
         Q 40 120 52 112Z"
      fill="url(#coat)"
      stroke="#1F1C18"
      stroke-width="3.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Cheek / forehead highlight -->
    <path
      d="M54 82
         Q 62 62 78 60
         Q 98 58 108 74
         Q 98 68 84 70
         Q 66 72 54 82Z"
      fill="#FFE1A8"
      opacity="0.55"
    />

    <!-- Muzzle highlight (adds volume) -->
    <path
      d="M86 82
         Q 104 66 122 78
         Q 132 88 122 98
         Q 104 110 84 98
         Q 78 90 86 82Z"
      fill="url(#muzzle)"
      stroke="#1F1C18"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.98"
    />

    <!-- Eye (almond) -->
    <path
      d="M88 80Q 94 74 102 78Q 94 86 88 80Z"
      fill="#1F1C18"
      opacity="0.95"
    />
    <circle cx="96.5" cy="78.5" r="1.2" fill="#FFFFFF" opacity="0.75"/>

    <!-- Nose (chunky, village-dog style) -->
    <path
      d="M122 80
         Q 132 80 134 88
         Q 132 96 122 96
         Q 114 92 116 88
         Q 116 82 122 80Z"
      fill="#1F1C18"
    />
    <!-- Nostril hint -->
    <path d="M128 90Q 126 92 123 92" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.14"/>

    <!-- Mouth + chin line -->
    <path d="M104 102Q 112 110 124 106" stroke="#1F1C18" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M96 110Q 104 118 112 116" stroke="#1F1C18" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>

    <!-- Fur tufts (cheek + neck) -->
    <path d="M70 112L62 116" stroke="#1F1C18" stroke-width="2.2" stroke-linecap="round" opacity="0.22"/>
    <path d="M74 118L66 122" stroke="#1F1C18" stroke-width="2.2" stroke-linecap="round" opacity="0.18"/>

    <!-- Collar + tag (keeps LucidMap accent colors) -->
    <path d="M48 118C60 136 76 142 100 130" stroke="#2A6F6B" stroke-width="10" stroke-linecap="round"/>
    <circle cx="80" cy="134" r="9" fill="#FFFFFF" opacity="0.95"/>
    <path d="M80 128C76 132 74 134 74 138C74 143 77.5 146 80 148C82.5 146 86 143 86 138C86 134 84 132 80 128Z" fill="#D2642A"/>
    <circle cx="80" cy="138" r="2.1" fill="white" opacity="0.85"/>
  </g>

  <defs>
    <linearGradient id="bg" x1="8" y1="8" x2="152" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7EADB"/>
      <stop offset="1" stop-color="#EAD8C2"/>
    </linearGradient>
    <linearGradient id="coat" x1="44" y1="52" x2="134" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7C255"/>
      <stop offset="1" stop-color="#E7A22E"/>
    </linearGradient>
    <radialGradient id="muzzle" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(106 90) rotate(90) scale(22 30)">
      <stop stop-color="#FFF2DA"/>
      <stop offset="1" stop-color="#F3E2C9"/>
    </radialGradient>
    <radialGradient id="neckShadow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(74 128) rotate(90) scale(18 34)">
      <stop stop-color="#1F1C18"/>
      <stop offset="1" stop-color="#1F1C18" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
